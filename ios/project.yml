# XcodeGen 工程定义 —— `xcodegen generate` 生成 Stellatrix.xcodeproj。
# 原生 SwiftUI 对话客户端:连官方服务器或用户自建服务器(BYO-server 工具型)。
name: Stellatrix
options:
  bundleIdPrefix: icu.stellatrix
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: zh-Hans
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Stellatrix:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources   # en.lproj / zh-Hans.lproj 本地化资源(变体组)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: icu.stellatrix.chat
        PRODUCT_NAME: Stellatrix
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        # 本地构建:export DEVELOPMENT_TEAM=<你的TeamID> 后再跑 xcodegen;或留空走 Xcode 自动签名。
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
