name: desktop-release

# 打 tag v* 触发,构建桌面服务端并发布到本仓 GitHub Releases。
# 矩阵按「原生架构」分三机:每机各自捆绑本架构的便携 Python + PostgreSQL(不能跨架构),
# electron-builder 只构建该架构 → 合并发布到同一 Release + 生成更新 feed。
#
# 需要的仓库 Secrets:
#   MAC_CERT_P12_BASE64 / MAC_CERT_PASSWORD     Developer ID Application 证书(base64 的 .p12)
#   APPLE_API_KEY_P8_BASE64 / APPLE_API_KEY_ID / APPLE_API_ISSUER   公证用 ASC API Key
#   WIN_CERT_P12_BASE64 / WIN_CERT_PASSWORD     Authenticode 证书(可缺省,缺则不签名仅 SmartScreen 告警)
#   GITHUB_TOKEN 自动提供(发布到本仓 Releases)
#   ── 回退分发(可选,缺省则跳过):把同批更新包同时上传到我的服务器,供客户端在 GitHub 超时时回退 ──
#   UPDATE_SERVER_HOST / UPDATE_SERVER_USER / UPDATE_SERVER_PATH   目标主机/用户/目录(nginx 静态目录,未来可反代到对象存储)
#   UPDATE_SERVER_SSH_KEY                                          上传用 SSH 私钥(deploy key)

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write   # 发布 Release 资产

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, platform: mac, arch: arm64 }
          - { os: windows-latest, platform: win, arch: x64 }
          # Intel mac(macos-13)暂不构建:GitHub Intel runner 稀缺、常排队卡死;
          # arm64 覆盖绝大多数在用 Mac。需要 x64 mac 时再加回 { os: macos-13, platform: mac, arch: x64 }。
    runs-on: ${{ matrix.os }}
    # 仅当配置了服务器 Secret 才执行回退分发(否则该步骤跳过,不影响 GitHub 发布)。
    env:
      UPLOAD_ENABLED: ${{ secrets.UPDATE_SERVER_HOST != '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 安装 desktop 依赖
        working-directory: desktop
        run: npm ci

      # 运行时缓存(便携 Python+依赖 + 便携 PG)→ 跨补丁构建运行时字节一致 → electron-updater
      # blockmap 差量极小 → 本地部署只拉小更新包。key 含 PY/PG 版本 + requirements.txt 哈希:
      # 依赖变则缓存失效重建;bug 补丁(deps 不变)命中缓存 → 运行时复用,只有 app 代码进差量。
      - name: 缓存便携运行时(小体积差量更新关键)
        uses: actions/cache@v6
        with:
          path: desktop/.runtime-cache
          key: rt-${{ matrix.platform }}-${{ matrix.arch }}-py3.12.13-pg17.10-${{ hashFiles('rpg/requirements.txt') }}

      - name: 组装后端 bundle (mac/linux)
        if: matrix.platform == 'mac'
        working-directory: desktop
        run: bash scripts/bundle-backend.sh

      - name: 组装后端 bundle (windows)
        if: matrix.platform == 'win'
        working-directory: desktop
        shell: pwsh
        run: ./scripts/bundle-backend.ps1

      # ── macOS:写出公证 API Key 文件 ──
      - name: 准备 Apple 公证 API Key
        if: matrix.platform == 'mac'
        run: |
          mkdir -p "$HOME/.private_keys"
          echo "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" | base64 --decode > "$HOME/.private_keys/AuthKey.p8"
          echo "APPLE_API_KEY=$HOME/.private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: 构建 + 签名 + 公证 + 发布 (macOS)
        if: matrix.platform == 'mac'
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish always

      - name: 构建 + 签名 + 发布 (Windows)
        if: matrix.platform == 'win'
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.WIN_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish always

      - name: 校验签名 (macOS,诊断用)
        if: matrix.platform == 'mac'
        working-directory: desktop
        continue-on-error: true
        run: |
          APP=$(find release/mac* -name '*.app' -maxdepth 2 | head -1) || true
          if [ -n "$APP" ]; then codesign -dv --verbose=4 "$APP" || true; spctl -vvv --assess --type exec "$APP" || true; fi

      # ── 回退分发:把同批更新包(安装包 + latest*.yml + blockmap)上传到我的服务器 ──
      # electron-updater 的 generic 源就读这个目录;客户端 GitHub 超时时自动回退到这里。
      # 仅在配置了 UPDATE_SERVER_* Secret 时执行;未配置则跳过,GitHub 发布不受影响。
      - name: 分发到我的服务器(更新回退源)
        if: ${{ env.UPLOAD_ENABLED == 'true' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.UPDATE_SERVER_HOST }}
          username: ${{ secrets.UPDATE_SERVER_USER }}
          key: ${{ secrets.UPDATE_SERVER_SSH_KEY }}
          source: "desktop/release/*.dmg,desktop/release/*.zip,desktop/release/*.exe,desktop/release/*.blockmap,desktop/release/latest*.yml"
          target: ${{ secrets.UPDATE_SERVER_PATH }}
          strip_components: 2
          overwrite: true
